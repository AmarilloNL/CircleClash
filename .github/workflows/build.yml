# Builds CircleClash into standalone Windows + Linux apps with PyInstaller and
# attaches them to the GitHub Release.
#
# Trigger it by pushing a version tag:
#     git tag v1.0.0
#     git push origin v1.0.0
# or run it by hand from the Actions tab ("Run workflow").
#
# Notes:
#  - ffmpeg is NOT bundled. Users must have ffmpeg on their PATH (see the README).
#  - danser-go is NOT bundled; the app downloads it on first run.
#  - Chromium (for the overlay) IS bundled via Playwright + --collect-all, using
#    PLAYWRIGHT_BROWSERS_PATH=0 so it lives inside the packaged app. This makes the
#    build large (~300-400 MB) but fully self-contained.

name: build

on:
  push:
    tags: ['v*']
  workflow_dispatch:        # lets you run a test build from the Actions tab

permissions:
  contents: write           # needed to attach files to the release

jobs:
  build:
    name: build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: CircleClash-windows
          - os: ubuntu-latest
            artifact: CircleClash-linux

    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Download Chromium (bundled into the app)
        env:
          PLAYWRIGHT_BROWSERS_PATH: '0'   # install inside the playwright package so PyInstaller can collect it
        run: python -m playwright install chromium

      - name: Build with PyInstaller
        env:
          PLAYWRIGHT_BROWSERS_PATH: '0'
        run: >
          pyinstaller --noconfirm --clean --windowed
          --name CircleClash
          --collect-all playwright
          renderer_gui.py
        # PySide6 is handled by PyInstaller's built-in hook. make_overlay_video and
        # the other modules are picked up automatically because renderer_gui imports
        # make_overlay_video in its --run-pipeline branch.

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          cd dist
          zip -r "../${{ matrix.artifact }}.zip" CircleClash

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: Compress-Archive -Path dist/CircleClash -DestinationPath ${{ matrix.artifact }}.zip

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.zip

      - name: Attach to the release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact }}.zip
