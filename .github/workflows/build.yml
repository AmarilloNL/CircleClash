# Builds CircleClash with PyInstaller for Windows and attaches the result to the
# GitHub Release.
#
# Trigger it by pushing a version tag:
#     git tag v1.1.5
#     git push origin v1.1.5
# or run it by hand from the Actions tab ("Run workflow").
#
# Notes:
#  - Output is a ONE-FOLDER app, zipped: CircleClash-windows.zip. Users extract the
#    zip and run CircleClash.exe inside.
#  - We use --onedir (not --onefile) on purpose: --onefile unpacks the whole bundle
#    (incl. the ~300-400 MB Chromium) to a temp dir on EVERY launch, which is what made
#    startup slow. --onedir extracts nothing at runtime, so it boots near-instantly.
#  - Chromium (for the overlay) IS bundled via Playwright + --collect-all, using
#    PLAYWRIGHT_BROWSERS_PATH=0 so it lives inside the packaged app.
#  - danser-go and ffmpeg are NOT bundled; the app fetches them on first run.
#  - Linux users build from source (see the README) -- no Linux release is published.

name: build

on:
  push:
    tags: ['v*']
  workflow_dispatch:        # lets you run a test build from the Actions tab

permissions:
  contents: write           # needed to attach files to the release

jobs:
  build:
    name: build (windows)
    runs-on: windows-latest

    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pillow

      - name: Download Chromium (bundled into the app)
        env:
          PLAYWRIGHT_BROWSERS_PATH: '0'   # install inside the playwright package so PyInstaller can collect it
        run: python -m playwright install chromium

      - name: Generate the app icon
        run: python make_icon.py

      - name: Build one-folder app
        env:
          PLAYWRIGHT_BROWSERS_PATH: '0'
        run: >
          pyinstaller --noconfirm --clean --onedir --windowed
          --name CircleClash
          --icon icon.ico
          --collect-all playwright
          --add-data "icon.ico;."
          --add-data "icon.png;."
          renderer_gui.py
        # PySide6 is handled by PyInstaller's built-in hook. make_overlay_video and the
        # other modules are picked up automatically because renderer_gui imports
        # make_overlay_video in its --run-pipeline branch.

      - name: Zip the app folder
        run: Compress-Archive -Path dist/CircleClash -DestinationPath "CircleClash-windows.zip"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: CircleClash-windows.zip
          path: CircleClash-windows.zip

      - name: Attach to the release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: CircleClash-windows.zip
